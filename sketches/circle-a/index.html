<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Circle-A Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="sketch-container"></div>

<div id="controls">
  <div class="control-group">
    <label>Noise <span id="noise-val">10</span></label>
    <input type="range" id="noise" min="0" max="40" value="10" step="0.5">
  </div>
  <div class="control-group">
    <label>Stroke <span id="weight-val">3.5</span></label>
    <input type="range" id="weight" min="1" max="10" value="3.5" step="0.5">
  </div>
  <div class="control-group">
    <label>Passes <span id="passes-val">2</span></label>
    <input type="range" id="passes" min="1" max="5" value="2" step="1">
  </div>
  <div class="control-group">
    <label>Detail <span id="detail-val">1.0</span></label>
    <input type="range" id="detail" min="0.2" max="3" value="1.0" step="0.1">
  </div>
  <button id="regen">Regenerate</button>
  <button id="download-png">Download PNG</button>
  <button id="download-svg">Download SVG</button>
</div>

<script src="sketch.js"></script>
</body>
</html>
